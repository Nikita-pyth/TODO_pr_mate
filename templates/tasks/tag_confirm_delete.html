{% extends "base.html" %}

{% block content %}
  <div class="container mt-4">
    <h2 class="text-danger">Confirm Deletion</h2>
    <p>Are you sure you want to delete the tag: <strong>{{ object.name }}</strong>?</p>

    <form method="post">
      {% csrf_token %}
      <a href="{% url 'tasks:tag-list' %}" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-danger">Delete</button>
    </form>
  </div>
{% endblock %}
