{% extends "base.html" %}

{% block content %}
  <div class="container mt-4">
    <h2 class="fw-bold">{{ view.object.pk|yesno:"Edit Tag,Create Tag" }}</h2>

    <form method="post" action="">
      {% csrf_token %}
      {{ form.as_p }}

      <a href="{% url 'tasks:tag-list' %}" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">Save</button>
    </form>
  </div>
{% endblock %}
